<!doctype html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productivity Dashboard</title>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/dashboard.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div class="app-container">

    <aside class="sidebar">
      <nav aria-label="Primary">
        <ul class="nav-links">
          <li><a href="index.html" data-page="index.html">Home</a></li>
          <li><a href="dashboard.html" data-page="dashboard.html">Dashboard</a></li>
          <li><a href="tasks.html" data-page="tasks.html">Tasks</a></li>
          <li><a href="notes.html" data-page="notes.html">Notes</a></li>
          <li><a href="focus.html" data-page="focus.html">Focus</a></li>
          <li><a href="expenses.html" data-page="expenses.html">Expenses</a></li>
          <li><a href="settings.html" data-page="settings.html">Settings</a></li>
        </ul>
      </nav>
    </aside>

    <main class="content" role="main">
      <header class="app-header">
        <div class="logo">
          <img src="assets/images/logo-dark.png" alt="Productivity App Logo" class="logo-icon">
        </div>
        <div class="welcome-msg">
          <span class="welcome-text">Welcome, User!</span>
          <div class="time-and-date">
            <span id="current-time">00:00:00</span>
            <span id="current-date">01/01/2023</span>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" id="theme-toggle" class="theme-toggle-btn" aria-label="Switch to light mode" aria-pressed="false">
            <span class="theme-toggle-icon" aria-hidden="true">☀️</span>
            <span class="theme-toggle-label">Light</span>
          </button>
          <div class="dashboard-link">
            <a href="dashboard.html">Dashboard</a>
          </div>
          <div class="notification" id="notification-widget">
            <span class="notification-icon" aria-label="Notifications">🔔</span>
            <span class="notification-count" id="notification-badge" hidden>0</span>
          </div>
          <div class="profile-avatar">Avatar</div>
        </div>
      </header>

      <div class="page-content">
        <section class="dashboard-tabs-section">
          <div class="dashboard-tabs task-tabs" id="dashboard-tab-list" role="tablist" aria-label="Dashboard tabs">
            <button class="tab-btn active" type="button" data-dashboard-tab="all" role="tab" aria-selected="true">All</button>
            <button class="tab-btn" type="button" data-dashboard-tab="tasks" role="tab" aria-selected="false">Tasks</button>
            <button class="tab-btn" type="button" data-dashboard-tab="notes" role="tab" aria-selected="false">Notes</button>
            <button class="tab-btn" type="button" data-dashboard-tab="focus" role="tab" aria-selected="false">Focus</button>
            <button class="tab-btn" type="button" data-dashboard-tab="expenses" role="tab" aria-selected="false">Expenses</button>
          </div>
        </section>
        <section class="dashboard-stats-grid quick-stats">
          <!-- 6 stat cards -->
          <article class="stat-card">
            <h3>Total Tasks</h3>
            <p id="dashboard-total-tasks">0</p>
          </article>
          <article class="stat-card">
            <h3>Completed Tasks</h3>
            <p id="dashboard-completed-tasks">0</p>
          </article>
          <article class="stat-card">
            <h3>Pending Tasks</h3>
            <p id="dashboard-pending-tasks">0</p>
          </article>
          <article class="stat-card">
            <h3>Overdue Tasks</h3>
            <p id="dashboard-overdue-tasks">0</p>
          </article>
          <article class="stat-card">
            <h3>Completed Today</h3>
            <p id="dashboard-completed-today">0</p>
          </article>
          <article class="stat-card">
            <h3>Completion Rate</h3>
            <p id="dashboard-completion-rate">0%</p>
          </article>

        </section>

        <!-- SPLIT PANEL FOR ACTIVITY & INSIGHTS -->
        <div class="dashboard-split" style="margin-top: 24px;">
          
          <!-- LEFT: Recent Activity -->
          <div class="split-main">
            <section class="recent-activity-section form-card widget-card-dashboard">
              <div class="widget-header-dashboard">
                <h3 class="split-section-title widget-title-accent">Recent Activity</h3>
              </div>
              <div id="recent-activity-list" class="widget-list-container">
                <!-- Recent activities rendered by JS -->
              </div>
            </section>
          </div>

          <!-- RIGHT: Productivity Insights -->
          <div class="split-aside">
            <section class="productivity-insights-section form-card widget-card-dashboard">
              <div class="widget-header-dashboard">
                <h3 class="split-section-title widget-title-analytics">Productivity Insights</h3>
              </div>
              <div id="dashboard-insights-list" class="widget-list-container-padded">
                <!-- Insights rendered by JS -->
              </div>
            </section>
          </div>

        </div>

      </div>

    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>

</html>
