<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productivity Dashboard</title>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div class="app-container">

    <aside class="sidebar">
      <nav aria-label="Primary">
        <ul class="nav-links">
          <li><a href="index.html" data-page="index.html">Home</a></li>
          <li><a href="dashboard.html" data-page="dashboard.html">Dashboard</a></li>
          <li><a href="tasks.html" data-page="tasks.html">Tasks</a></li>
          <li><a href="notes.html" data-page="notes.html">Notes</a></li>
          <li><a href="focus.html" data-page="focus.html">Focus</a></li>
          <li><a href="expenses.html" data-page="expenses.html">Expenses</a></li>
          <li><a href="settings.html" data-page="settings.html">Settings</a></li>
        </ul>
      </nav>
    </aside>

    <main class="content" role="main">
      <header class="app-header">
        <div class="logo">
          <img src="assets/images/logo.png" alt="Productivity App Logo" class="logo-icon">
        </div>
        <div class="welcome-msg">
          <span class="welcome-text">Welcome, User!</span>
          <div class="time-and-date">
            <span id="current-time">00:00:00</span>
            <span id="current-date">01/01/2023</span>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" id="theme-toggle" class="theme-toggle-btn" aria-label="Switch to light mode" aria-pressed="false">
            <span class="theme-toggle-icon" aria-hidden="true">☀️</span>
            <span class="theme-toggle-label">Light</span>
          </button>
          <div class="dashboard-link">
            <a href="dashboard.html">Dashboard</a>
          </div>
          <div class="notification">
            <span class="notification-icon">notification</span>
            <span class="notification-count">3</span>
          </div>
          <div class="profile-avatar">Avatar</div>
        </div>
      </header>

      <div class="page-content">

        <section class="focus-timer-section">

          <h1>Focus Session</h1>

          
          <div id="focus-timer-display">
            <!-- Time will be rendered through Js -->
          </div>

          <div class="focus-controls">

            <button id="start-focus-btn" class="primary-btn">
              Start
            </button>

            <button id="pause-focus-btn" class="secondary-btn">
              Pause
            </button>

            <button id="reset-focus-btn" class="secondary-btn">
              Reset
            </button>
            <input type="text" name="" id="session-name" placeholder="Session Name (optional)" />

          </div>

        </section>

        <section class="focus-history-section">

          <h2>Session History</h2>

          <div id="focus-history-list">
            <!-- Focus session history rendered by JS -->
          </div>

        </section>

      </div>

    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>

</html>
