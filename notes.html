<!doctype html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productivity Dashboard</title>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div class="app-container">

    <aside class="sidebar">
      <nav aria-label="Primary">
        <ul class="nav-links">
          <li><a href="index.html" data-page="index.html">Home</a></li>
          <li><a href="dashboard.html" data-page="dashboard.html">Dashboard</a></li>
          <li><a href="tasks.html" data-page="tasks.html">Tasks</a></li>
          <li><a href="notes.html" data-page="notes.html">Notes</a></li>
          <li><a href="focus.html" data-page="focus.html">Focus</a></li>
          <li><a href="expenses.html" data-page="expenses.html">Expenses</a></li>
          <li><a href="settings.html" data-page="settings.html">Settings</a></li>
        </ul>
      </nav>
    </aside>

    <main class="content" role="main">
      <header class="app-header">
        <div class="logo">
          <img src="assets/images/logo-dark.png" alt="Productivity App Logo" class="logo-icon">
        </div>
        <div class="welcome-msg">
          <span class="welcome-text">Welcome, User!</span>
          <div class="time-and-date">
            <span id="current-time">00:00:00</span>
            <span id="current-date">01/01/2023</span>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" id="theme-toggle" class="theme-toggle-btn" aria-label="Switch to light mode"
            aria-pressed="false">
            <span class="theme-toggle-icon" aria-hidden="true">☀️</span>
            <span class="theme-toggle-label">Light</span>
          </button>
          <div class="dashboard-link">
            <a href="dashboard.html">Dashboard</a>
          </div>
          <div class="notification" id="notification-widget">
            <span class="notification-icon" aria-label="Notifications">🔔</span>
            <span class="notification-count" id="notification-badge" hidden>0</span>
          </div>
          <div class="profile-avatar">Avatar</div>
        </div>
      </header>


      <div class="page-content">

        <section id="notes-stats" class="quick-stats">
          <div class="stat-card">
            <h3>Total Notes</h3>
            <p id="total-notes-count" class="stat-value">0</p>
          </div>

          <div class="stat-card">
            <h3>Notes created today</h3>
            <p id="notes-created-today-count" class="stat-value">0</p>
          </div>

          <div class="stat-card">
            <h3>Notes Updated This Week</h3>
            <p id="notes-updated-this-week-count" class="stat-value">0</p>
          </div>
        </section>


        <div class="add-note-trigger-container" style="margin-bottom: 24px;">
          <button type="button" id="open-add-note-btn" class="primary-btn add-note-trigger-btn">
            <span class="btn-icon">+</span> Add New Note
          </button>
        </div>

        <!-- Modal Overlay Backdrop -->
        <div id="add-note-modal" class="modal-overlay" aria-hidden="true" style="display: none;">
          <div class="modal-container">
            <section class="notes-form-section form-card">
              <div class="modal-header">
                <h2 id="modal-title-text">Create Note</h2>
                <button type="button" class="close-modal-btn" id="close-modal-btn"
                  aria-label="Close modal">&times;</button>
              </div>
              <form id="note-form">
                <div class="form-group">
                  <label for="note-title">Title</label>
                  <input id="note-title" type="text" placeholder="Note title" required />
                </div>
                <div class="form-group">
                  <label for="note-content">Content</label>
                  <textarea id="note-content" placeholder="Write your note..." required rows="5"></textarea>
                </div>
                <div class="form-actions">
                  <button type="submit" class="primary-btn">Save Note</button>
                  <button type="button" id="cancel-edit-btn" class="secondary-btn" hidden="true">Cancel Edit</button>
                </div>
              </form>
            </section>
          </div>
        </div>

        <div class="notes-split-container" id="notes-split-container">
          <section class="notes-list-section" id="notes-list-panel">
            <h2>Your Notes</h2>
            <div id="notes-list-container"></div>
          </section>

          <!-- Inline Note Detail Panel (right side) -->
          <section class="note-detail-panel" id="note-detail-panel" aria-hidden="true">
            <div class="detail-panel-header">
              <button type="button" class="drawer-back-btn" id="drawer-close-btn" aria-label="Close panel">
                <span aria-hidden="true">←</span> Back
              </button>
              <div class="drawer-actions">
                <button type="button" class="delete-note-btn drawer-delete-btn" id="drawer-delete-btn">Delete</button>
              </div>
            </div>

            <!-- Inline editing toolbar for the drawer -->
            <div class="drawer-toolbar" id="drawer-toolbar" style="display:none;">
              <div class="format-btns">
                <button type="button" class="format-btn" data-cmd="bold" aria-label="Bold"><strong>B</strong></button>
                <button type="button" class="format-btn" data-cmd="italic" aria-label="Italic"><em>I</em></button>
                <button type="button" class="format-btn" data-cmd="underline" aria-label="Underline"><u>U</u></button>
              </div>
              <div class="drawer-toolbar-actions">
                <button type="button" id="drawer-save-btn" class="primary-btn">Save</button>
                <button type="button" id="drawer-cancel-edit-btn" class="secondary-btn">Cancel</button>
              </div>
            </div>

            <div class="detail-panel-body">
              <div id="drawer-note-title" class="drawer-note-title" contenteditable="true" role="textbox" aria-label="Note title"></div>
              <div class="drawer-note-meta" id="drawer-note-meta"></div>
              <div class="drawer-note-content" id="drawer-note-content" contenteditable="true"></div>
            </div>
          </section>
        </div>

      </div>

    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>

</html>
